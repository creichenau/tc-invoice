<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T&K Services Field Ticket</title>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
    </script>
    <script type="text/javascript">
        (function () {
            emailjs.init({
                publicKey: "u2kD264US6flsgLA0",
            });
        })();            
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f5f5;
        }

        .center-screen {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            /* horizontal centering */
            text-align: center;
            /* keeps multi-line text centered */
        }

        .form-container {
            max-width: 480px;
            margin: auto;
            background: white;
            padding: 1.25rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .invoice-container {
            height: 1033px;
            width: 400px;
            margin: auto;
            background: white;
            padding: 1.25rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-top: 1rem;
            font-weight: bold;
        }

        input,
        textarea {
            width: 95%;
            padding: 0.75rem;
            margin-top: 0.35rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        .invoice-container input,
        textarea {
            width: 100px;
            height: 3px;
            position: absolute;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.9rem;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
        }

        #addLineItem {
            background: #28a745;
            margin-top: 1rem;
        }

        .form-background {
            background-image: url("images/invoice_form.png");
            background-size: cover;
            /* fills the div */
            background-position: center;
            /* keeps it centered */
            background-repeat: no-repeat;
        }

        .amount {
            position: absolute;
            left: 360px;
        }

        .ticket_number {
            position: absolute;
            font-weight: bold;
        }

        .line_item_qty {
            width: 19px !important;
            left: 14px !important;
        }

        .line_item_name {
            width: 188px !important;
            left: 64px !important;
        }

        .line_item_rate {
            width: 47px !important;
            left: 281px !important;
        }

        .line_item_amount {
            width: 188px !important;
            left: 64px !important;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 5px solid #ccc;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

</head>

<body>
    <div id="userCodeErrorMessage" class="center-screen" style="display:none;">
        <b>No User Code Detected</b><br>
        <br />
        <div>
            Please contact support and ask for a valid URL that includes the correct user code.
        </div>
    </div>
    <div id="loadingMessage" style="display:none; margin-top: 30px;">
        <b style="margin-left: 44%">Submitting Invoice...</b>
        <div id="loader" class="spinner"></div>
    </div>
    <form id="invoiceForm">
        <div class="invoice-container form-background">

            <span class="ticket_number" id="fullTicketNumber" style="top: 35px; left: 300px;">TST10001</span>

            <input type="text" id="invoiceNumber" style="left: 258px; top: 56px; width: 140px;" />
            <input type="date" id="invoiceDate" style="left: 258px; top: 94px; width: 140px;" required />
            <input type="text" id="companyName" style="left: 90px; top: 134px; width: 308px;" required />

            <textarea id="leaseNumber"
                style="left: 20px; top: 207px; width: 377px; height: 23px; min-height: 23px;"></textarea>

            <textarea id="jobDescription"
                style="left: 20px; top: 286px; width: 377px; height: 110px; min-height: 70px;"></textarea>

            <!-- Item #1 -->
            <input type="text" id="lineitem1_qty" class="line_item_qty" style="top: 469px;" onchange="updateAmount()" />
            <input type="text" id="lineitem1_name" class="line_item_name" style="top: 469px;" />
            <input type="text" id="lineitem1_rate" class="line_item_rate" style="top: 469px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount1" style="top: 481px;">$0.00</span>

            <!-- Item #2 -->
            <input type="text" id="lineitem2_qty" class="line_item_qty" style="top: 515px;" onchange="updateAmount()" />
            <input type="text" id="lineitem2_name" class="line_item_name" style="top: 515px;" />
            <input type="text" id="lineitem2_rate" class="line_item_rate" style="top: 515px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount2" style="top: 527px;">$0.00</span>

            <!-- Item #3 -->
            <input type="text" id="lineitem3_qty" class="line_item_qty" style="top: 558px;" onchange="updateAmount()" />
            <input type="text" id="lineitem3_name" class="line_item_name" style="top: 558px;" />
            <input type="text" id="lineitem3_rate" class="line_item_rate" style="top: 558px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount3" style="top: 570px;">$0.00</span>

            <!-- Item #4 -->
            <input type="text" id="lineitem4_qty" class="line_item_qty" style="top: 602px;" onchange="updateAmount()" />
            <input type="text" id="lineitem4_name" class="line_item_name" style="top: 602px;" />
            <input type="text" id="lineitem4_rate" class="line_item_rate" style="top: 602px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount4" style="top: 615px;">$0.00</span>

            <!-- Item #5 -->
            <input type="text" id="lineitem5_qty" class="line_item_qty" style="top: 644px;" onchange="updateAmount()" />
            <input type="text" id="lineitem5_name" class="line_item_name" style="top: 644px;" />
            <input type="text" id="lineitem5_rate" class="line_item_rate" style="top: 644px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount5" style="top: 657px;">$0.00</span>

            <!-- Item #6 -->
            <input type="text" id="lineitem6_qty" class="line_item_qty" style="top: 689px;" onchange="updateAmount()" />
            <input type="text" id="lineitem6_name" class="line_item_name" style="top: 689px;" />
            <input type="text" id="lineitem6_rate" class="line_item_rate" style="top: 689px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount6" style="top: 701px;">$0.00</span>

            <!-- Item #7 -->
            <input type="text" id="lineitem7_qty" class="line_item_qty" style="top: 732px;" onchange="updateAmount()" />
            <input type="text" id="lineitem7_name" class="line_item_name" style="top: 732px;" />
            <input type="text" id="lineitem7_rate" class="line_item_rate" style="top: 732px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount7" style="top: 744px;">$0.00</span>

            <!-- Item #8 -->
            <input type="text" id="lineitem8_qty" class="line_item_qty" style="top: 773px;" onchange="updateAmount()" />
            <input type="text" id="lineitem8_name" class="line_item_name" style="top: 773px;" />
            <input type="text" id="lineitem8_rate" class="line_item_rate" style="top: 773px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount8" style="top: 784px;">$0.00</span>

            <!-- Item #9 -->
            <input type="text" id="lineitem9_qty" class="line_item_qty" style="top: 816px;" onchange="updateAmount()" />
            <input type="text" id="lineitem9_name" class="line_item_name" style="top: 816px;" />
            <input type="text" id="lineitem9_rate" class="line_item_rate" style="top: 816px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount9" style="top: 829px;">$0.00</span>

            <!-- Item #10 -->
            <input type="text" id="lineitem10_qty" class="line_item_qty" style="top: 858px;"
                onchange="updateAmount()" />
            <input type="text" id="lineitem10_name" class="line_item_name" style="top: 858px;" />
            <input type="text" id="lineitem10_rate" class="line_item_rate" style="top: 858px;"
                onchange="updateAmount()" />
            <span class="amount" id="amount10" style="top: 871px;">$0.00</span>

            <span class="amount" id="amountSubtotal" style="top: 933px; left: 323px;">$0.00</span>
            <input type="text" id="amountTax" style="top: 956px; left: 314px; width: 88px;" onchange="updateAmount()" />
            <span class="amount" id="amountTotal" style="top: 1015px; left: 323px;">$0.00</span>

            <input type="text" id="receivedBy" style="top: 998px; left: 81px; width: 120px;" />
        </div>
        <div class="form-container">
            <button type="submit">Submit Invoice</button>
            <div style="width: 100%; margin-top: 20px; text-align: center; font-size: medium;">Submitting as <b><span
                        id="userName">ERROR</span></b>.</div>
            <div style="display: none;" id="userId"></div>
            <div style="display: none;" id="ticketNumber"></div>
        </div>
    </form>
    <script>

        async function loadUserData(userCode) {
            try {
                const response = await fetch('https://invoicetracker-cmgkcjhkg2hndfdq.canadacentral-01.azurewebsites.net/api/getUser?userCode=' + userCode);
                const data = await response.json();

                if (response.status == 400) {
                    document.getElementById('invoiceForm').style.display = "none";
                    document.getElementById('userCodeErrorMessage').style.display = "block";
                } else {
                    document.getElementById('userId').textContent = data.userId;
                    document.getElementById('userName').textContent = data.name;
                    document.getElementById('fullTicketNumber').textContent = data.preface + data.nextTicketNumber;
                    document.getElementById('ticketNumber').textContent = data.nextTicketNumber;
                }

            } catch (err) {
                console.error('Error fetching user data:', err);
            }
        }

        async function saveInvoice(data) {
            try {
                const response = await fetch("https://invoicetracker-cmgkcjhkg2hndfdq.canadacentral-01.azurewebsites.net/api/saveInvoice", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                return true;

            } catch (err) {
                console.error("Error claiming invoice number:", err);
                return null;
            }
        }

        function updateAmount() {
            let subTotal = 0;
            for (let i = 1; i < 11; i++) {
                let qty_el = document.getElementById('lineitem' + i + '_qty');
                let qty = parseFloat(qty_el.value) || 0;
                let rate_el = document.getElementById('lineitem' + i + '_rate');
                let rate = parseFloat(rate_el.value) || 0;
                let amount = qty * rate;
                document.getElementById('amount' + i).textContent = `$${amount.toFixed(2)}`;
                subTotal = subTotal + amount;
            }
            document.getElementById('amountSubtotal').textContent = `$${subTotal.toFixed(2)}`;

            let taxAmount = document.getElementById('amountTax').value;
            let totalAmount = subTotal;
            if (!isNaN(taxAmount) && taxAmount > 0) {
                totalAmount = subTotal + Number(taxAmount);
            }
            document.getElementById('amountTotal').textContent = `$${totalAmount.toFixed(2)}`;
        }

        const params = new URLSearchParams(window.location.search);
        const userCode = params.get("usr");
        console.log("User code:", userCode);

        if (userCode != null) {
            loadUserData(userCode);
        } else {
            document.getElementById('invoiceForm').style.display = "none";
            document.getElementById('userCodeErrorMessage').style.display = "block";
        }

        document.getElementById("invoiceForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const lineItems = [];
            for (let i = 1; i <= 6; i++) {
                let qty = parseFloat(document.getElementById('lineitem' + i + '_qty').value) || 0;
                if (qty > 0) {
                    lineItems.push({
                        quantity: qty,
                        rate: parseFloat(document.getElementById('lineitem' + i + '_rate').value) || 0,
                        name: document.getElementById('lineitem' + i + '_name').value
                    });
                }
            }

            subTotal = document.getElementById('amountSubtotal').textContent;
            taxAmount = document.getElementById('amountTax').value;
            totalAmount = document.getElementById('amountTotal').textContent;
            userName = document.getElementById('userName').textContent;
            userId = document.getElementById('userId').textContent;
            fullTicketNumber = document.getElementById('fullTicketNumber').textContent;

            const data = {
                userId: userId,
                user: userName,
                fullTicketNumber: fullTicketNumber,
                ticketNumber: ticketNumber.textContent,
                companyName: companyName.value,
                invoiceNumber: invoiceNumber.value,
                invoiceDate: invoiceDate.value,
                leaseNumber: leaseNumber.value,
                jobDescription: jobDescription.value,
                lineItems: lineItems,
                subTotal: subTotal,
                taxAmount: taxAmount,
                totalAmount: totalAmount,
                receivedBy: receivedBy.value
            };

            console.log("Submitting invoice:", data);

            document.getElementById('loadingMessage').style.display = "block";
            document.getElementById('invoiceForm').style.display = "none";

            saveInvoice(data);

            emailjs.send("service_ffzq9qn", "template_pr8w3ob", data)
                .then(() => {
                    setTimeout(() => {
                        location.reload();
                   }, 5000);
                })
                .catch(err => alert("Error sending email: " + err));
        });
    </script>

</body>

</html>
