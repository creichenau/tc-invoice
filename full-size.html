<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>T&K Services Field Ticket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 1rem;
            background: #f5f5f5;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 5px solid #ccc;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .invoice-container {
            height: 1200px;
            width: 915px;
            margin: auto;
            background: white;
            padding: 1.25rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            position: relative;
        }

        .form-background {
            background-image: url("images/full_size_field_ticket.png");
            background-size: cover;
            /* fills the div */
            background-position: center;
            /* keeps it centered */
            background-repeat: no-repeat;
        }

        .center-screen {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            /* horizontal centering */
            text-align: center;
            /* keeps multi-line text centered */
        }

    </style>

</head>
<body>
    <div id="loadingMessage" style="display:none; margin-top: 30px;">
        <b style="margin-left: 47%">Loading Invoice...</b>
        <div id="loader" class="spinner"></div>
    </div>
    <div id="invoiceIdErrorMessage" class="center-screen" style="display:none;">
        <b>No Invoice ID Detected</b><br>
        <br />
        <div>
            Please contact support and ask for a valid URL that includes a valid invoice ID.
        </div>
    </div>
    <form id="invoiceForm">
        <div class="invoice-container form-background">
            <span id="ticketNumber" style="position:absolute; top: 97px; left: 723px; font-size: 18pt;"></span>
            <span id="invoiceNumber" style="position:absolute; top: 149px; left: 580px; font-size: 14pt;"></span>
            <span id="invoiceDate" style="position:absolute; top: 189px; left: 580px; font-size: 14pt;"></span>
            <span id="companyName" style="position:absolute; top: 223px; left: 194px; font-size: 14pt;"></span>
            <span id="leaseWellNumber" style="position:absolute; top: 253px; left: 305px; font-size: 14pt;"></span>
            <span id="jobDescription" style="position:absolute; top: 316px; left: 206px; font-size: 14pt;"></span>
            <span id="subTotal" style="position:absolute; top: 1032px; left: 726px; font-size: 14pt;">$0.00</span>
            <span id="taxAmount" style="position:absolute; top: 1068px; left: 726px; font-size: 14pt;">$0.00</span>
            <span id="totalAmount" style="position:absolute; top: 1105px; left: 726px; font-size: 14pt;">$0.00</span>
            <span id="receivedBy" style="position:absolute; top: 1102px; left: 183px; font-size: 14pt;"></span>
        
            <!-- Line Items -->
            <span id="lineitem_qty_1" style="position:absolute; top: 571px; left: 65px; font-size: 14pt;"></span>
            <span id="lineitem_name_1" style="position:absolute; top: 571px; left: 155px; font-size: 14pt;"></span>
            <span id="lineitem_rate_1" style="position:absolute; top: 571px; left: 688px; font-size: 14pt;"></span>
            <span id="lineitem_amount_1" style="position:absolute; top: 571px; left: 794px; font-size: 14pt;"></span>

            <span id="lineitem_qty_2" style="position:absolute; top: 609px; left: 65px; font-size: 14pt;"></span>
            <span id="lineitem_name_2" style="position:absolute; top: 609px; left: 155px; font-size: 14pt;"></span>
            <span id="lineitem_rate_2" style="position:absolute; top: 609px; left: 688px; font-size: 14pt;"></span>
            <span id="lineitem_amount_2" style="position:absolute; top: 609px; left: 794px; font-size: 14pt;"></span>

            <span id="lineitem_qty_3" style="position:absolute; top: 643px; left: 65px; font-size: 14pt;"></span>
            <span id="lineitem_name_3" style="position:absolute; top: 643px; left: 155px; font-size: 14pt;"></span>
            <span id="lineitem_rate_3" style="position:absolute; top: 643px; left: 688px; font-size: 14pt;"></span>
            <span id="lineitem_amount_3" style="position:absolute; top: 643px; left: 794px; font-size: 14pt;"></span>

             <span id="lineitem_qty_4" style="position:absolute; top: 643px; left: 65px; font-size: 14pt;"></span>
            <span id="lineitem_name_4" style="position:absolute; top: 643px; left: 155px; font-size: 14pt;"></span>
            <span id="lineitem_rate_4" style="position:absolute; top: 643px; left: 688px; font-size: 14pt;"></span>
            <span id="lineitem_amount_4" style="position:absolute; top: 643px; left: 794px; font-size: 14pt;"></span>
        
        </div>
    </form>
    <div class="center-screen">
        <p>Submitted by <span id="submittedBy">ERROR</span> on <span id="submittedDttm">ERROR</span>.</p>
    </div>
    <script>

        function showLoader() {
            document.getElementById('loadingMessage').style.display = "block";
            document.getElementById('invoiceForm').style.display = "none";
            document.getElementById('invoiceIdErrorMessage').style.display = "none";
        }

        function hideLoader() {
            document.getElementById('loadingMessage').style.display = "none";
            document.getElementById('invoiceForm').style.display = "block";
            document.getElementById('invoiceIdErrorMessage').style.display = "none";
        }

        async function loadInvoiceData(invoiceId) {
            try {
                const response = await fetch('https://invoicetracker-cmgkcjhkg2hndfdq.canadacentral-01.azurewebsites.net/api/getInvoice?invoiceId=' + invoiceId);
                const data = await response.json();

                if (response.status == 400) {
                    hideLoader();
                    document.getElementById('invoiceForm').style.display = "none";
                    document.getElementById('invoiceIdErrorMessage').style.display = "block";
                } else {
                    console.log(data);
                    
                    // invoice details
                    document.getElementById('ticketNumber').textContent = data.invoice.ticketNumberPreface + String(data.invoice.ticketNumber).padStart(4, "0"); 
                    document.getElementById('invoiceNumber').textContent = data.invoice.invoiceNumber;
                    document.getElementById('invoiceDate').textContent = new Date(data.invoice.invoiceDate).toLocaleDateString();
                    document.getElementById('companyName').textContent = data.invoice.companyName;
                    document.getElementById('leaseWellNumber').textContent = data.invoice.leaseNumber;
                    document.getElementById('jobDescription').textContent = data.invoice.jobDescription;
                    document.getElementById('receivedBy').textContent = data.invoice.receivedBy;

                    // line items
                    let cnt = 1;
                    let subTotal = 0;
                    data.invoice.lineItems.forEach(lineItem => {
                        let amt = Number(lineItem.quantity * lineItem.rate);
                        document.getElementById('lineitem_qty_' + cnt).textContent = lineItem.quantity;
                        document.getElementById('lineitem_name_' + cnt).textContent = lineItem.name;
                        document.getElementById('lineitem_rate_' + cnt).textContent = `$${lineItem.rate.toFixed(2)}`;
                        document.getElementById('lineitem_amount_' + cnt).textContent = `$${amt.toFixed(2)}`;
                        subTotal = subTotal + amt;
                        cnt = cnt + 1;
                    });

                    // calculations                                       
                    let taxAmount = data.invoice.taxAmount | 0;                    
                    let totalAmount = taxAmount + subTotal;
                    document.getElementById('taxAmount').textContent = `$${taxAmount.toFixed(2)}`;
                    document.getElementById('subTotal').textContent = `$${subTotal.toFixed(2)}`;
                    document.getElementById('totalAmount').textContent = `$${totalAmount.toFixed(2)}`;
                                        
                    // submission details 
                    document.getElementById('submittedBy').textContent = data.invoice.user;
                    document.getElementById('submittedDttm').textContent = new Date(data.invoice.submittedDttm).toLocaleString();
                                        
                    hideLoader();
                }

            } catch (err) {
                console.error('Error fetching invoice data:', err);
                hideLoader();
                document.getElementById('invoiceForm').style.display = "none";
                document.getElementById('invoiceIdErrorMessage').style.display = "block";
            }
        }
      
        showLoader();
        const params = new URLSearchParams(window.location.search);
        const invoiceId = params.get("id");
        console.log("Invoice ID:", invoiceId);

        if (invoiceId != null) {
            loadInvoiceData(invoiceId);
            document.getElementById('invoiceIdErrorMessage').style.display = "none";
            document.getElementById('invoiceForm').style.display = "block";
        } else {
            hideLoader();
            document.getElementById('invoiceForm').style.display = "none";
            document.getElementById('invoiceIdErrorMessage').style.display = "block";
        }

    </script>
</body>
</html>
